name: mean_reversion_baseline
version: "1.0"
template: mean_reversion
description: Deterministic mean-reversion baseline for silver research/backtests; waits for close-based reversion evidence and shifts signals forward one bar.
universe: [SILVER, GOLD]
underlying_symbol: SILVER
tradable_symbol: XAGUSD
timeframe: 1d
rules:
  entry: close finishes below slow trend minus an ATR band while relative volume is not stretched
  exit: close recovers to fast trend or slow trend after the signal bar
tags: [baseline, deterministic, mean_reversion, silver, research]
parameters:
  ema_fast: 20
  sma_slow: 50
  reversion_atr_multiple: 1.2
  relative_volume_max: 1.35
  stop_atr_multiple: 1.8
search_space:
  reversion_atr_multiple:
    kind: float
    low: 1.0
    high: 1.6
    step: 0.2
  relative_volume_max:
    kind: float
    low: 1.1
    high: 1.5
    step: 0.2
  stop_atr_multiple:
    kind: float
    low: 1.4
    high: 2.2
    step: 0.2
execution:
  fees_bps: 9
  slippage_bps: 7
  order_size_pct: 1.0
validation:
  warmup_bars: 60
  train_bars: 90
  test_bars: 30
  step_bars: 30
  walk_forward_required: true
  promote_requires_walk_forward: true
  robustness_required: true
  proxy_grade_if_symbol_mismatch: true
  max_search_trials: 12
