[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
asyncio_default_fixture_loop_scope = "function"
markers = [
  "unit: fast, isolated tests for local iteration",
  "integration: fixture-backed or route-level tests",
  "slow: expensive end-to-end or repeated pipeline tests",
]

[tool.mypy]
python_version = "3.12"
warn_unused_configs = true
warn_return_any = false
disallow_untyped_defs = true
ignore_missing_imports = true
exclude = ["tests"]
