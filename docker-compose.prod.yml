services:
  reverse-proxy:
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    env_file:
      - ${AI_TRADER_ENV_FILE:-.env.production}
    environment:
      AI_TRADER_SERVER_NAME: ${AI_TRADER_SERVER_NAME:-_}
      AI_TRADER_TLS_CERT_PATH: ${AI_TRADER_TLS_CERT_PATH:-}
      AI_TRADER_TLS_KEY_PATH: ${AI_TRADER_TLS_KEY_PATH:-}
    volumes:
      - ${AI_TRADER_TLS_MOUNT_DIR:-./deploy/certs}:/etc/nginx/certs:ro
      - ./deploy/acme:/var/www/certbot
    ports:
      - "${AI_TRADER_PUBLIC_HTTP_PORT:-80}:80"
      - "${AI_TRADER_PUBLIC_HTTPS_PORT:-443}:443"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/proxy-healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-trader-staging

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    env_file:
      - ${AI_TRADER_ENV_FILE:-.env.production}
    environment:
      AI_TRADER_RUNTIME_API_BASE: ${AI_TRADER_RUNTIME_API_BASE:-/api}
      AI_TRADER_RUNTIME_FRONTEND_URL: ${AI_TRADER_RUNTIME_FRONTEND_URL:-}
      AI_TRADER_RUNTIME_BACKEND_URL: ${AI_TRADER_RUNTIME_BACKEND_URL:-}
    expose:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ai-trader-staging

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ${AI_TRADER_ENV_FILE:-.env.production}
    environment:
      AI_TRADER_HOST: 0.0.0.0
      AI_TRADER_PORT: 8000
    expose:
      - "8000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ai-trader-staging

networks:
  ai-trader-staging:
    driver: bridge
