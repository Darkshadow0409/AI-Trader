name: trend_breakout_v1
version: "1.0"
template: trend_breakout
description: Daily BTC/ETH breakout strategy with trend confirmation and explicit post-breakout execution delay.
universe: [BTC, ETH]
underlying_symbol: BTC
tradable_symbol: BTC
timeframe: 1d
rules:
  entry: breakout_distance > breakout_buffer and trend_state == uptrend and relative_volume > relative_volume_min
  exit: close < ema_20 or structure_score < 1
tags: [trend, breakout, crypto]
parameters:
  breakout_buffer: 0.0
  relative_volume_min: 1.1
  stop_atr_multiple: 2.2
search_space:
  breakout_buffer:
    kind: float
    low: 0.0
    high: 0.02
    step: 0.01
  relative_volume_min:
    kind: float
    low: 1.0
    high: 1.4
    step: 0.1
  stop_atr_multiple:
    kind: float
    low: 1.8
    high: 2.8
    step: 0.2
execution:
  fees_bps: 8
  slippage_bps: 5
  order_size_pct: 1.0
validation:
  warmup_bars: 55
  train_bars: 90
  test_bars: 30
  step_bars: 30
  walk_forward_required: true
  promote_requires_walk_forward: true
  robustness_required: true
  proxy_grade_if_symbol_mismatch: true
  max_search_trials: 18
