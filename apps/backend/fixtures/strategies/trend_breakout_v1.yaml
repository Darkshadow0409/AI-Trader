name: trend_breakout_v1
version: "1.0.0"
template: trend_breakout
description: Daily breakout strategy with trend confirmation and explicit volume gating.
universe: [BTC, ETH]
underlying_symbol: BTC
tradable_symbol: BTC
timeframe: 1d
rules:
  entry: close breaks prior 20-day high, ema_fast above sma_slow, relative volume confirms
  exit: close loses ema_fast or falls back into range
tags: [trend, breakout, promoted-candidate]
parameters:
  breakout_window: 20
  ema_fast: 18
  sma_slow: 50
  rv_threshold: 1.1
  atr_window: 14
  rv_window: 20
search_space:
  breakout_window:
    kind: int
    low: 15
    high: 30
    step: 5
  ema_fast:
    kind: int
    low: 10
    high: 24
    step: 2
  sma_slow:
    kind: int
    low: 40
    high: 70
    step: 10
  rv_threshold:
    kind: float
    low: 1.0
    high: 1.6
    step: 0.2
execution:
  fees_bps: 8
  slippage_bps: 5
  order_size_pct: 1.0
validation:
  warmup_bars: 55
  train_bars: 90
  test_bars: 30
  step_bars: 30
  walk_forward_required: true
  promote_requires_walk_forward: true
  robustness_required: true
  proxy_grade_if_symbol_mismatch: true
  max_search_trials: 18

