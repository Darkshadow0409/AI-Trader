name: vol_expansion_v1
version: "1.0"
template: vol_expansion
description: Precious-metals expansion strategy that requires range growth, relative volume confirmation, and no lookahead execution.
universe: [WTI, GOLD, SILVER]
underlying_symbol: GOLD
tradable_symbol: XAUUSD
timeframe: 1d
rules:
  entry: atr_pct > atr_pct_ma * atr_expansion_threshold and relative_volume > relative_volume_min and return_5 > 0
  exit: atr_pct < atr_pct_ma or close < ema_20
tags: [volatility, expansion, commodities, gold]
parameters:
  atr_expansion_threshold: 1.1
  relative_volume_min: 1.2
  stop_atr_multiple: 2.4
search_space:
  atr_expansion_threshold:
    kind: float
    low: 1.0
    high: 1.5
    step: 0.1
  relative_volume_min:
    kind: float
    low: 1.0
    high: 1.6
    step: 0.1
  stop_atr_multiple:
    kind: float
    low: 1.8
    high: 3.0
    step: 0.2
execution:
  fees_bps: 9
  slippage_bps: 7
  order_size_pct: 1.0
validation:
  warmup_bars: 60
  train_bars: 90
  test_bars: 30
  step_bars: 30
  walk_forward_required: true
  promote_requires_walk_forward: true
  robustness_required: true
  proxy_grade_if_symbol_mismatch: true
  max_search_trials: 18
