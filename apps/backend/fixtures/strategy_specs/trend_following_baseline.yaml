name: trend_following_baseline
version: "1.0"
template: trend_breakout
description: Deterministic trend-following baseline for research/backtest contract checks; uses delayed breakout confirmation and no future bars.
universe: [WTI, GOLD, SILVER]
underlying_symbol: WTI
tradable_symbol: USOUSD
timeframe: 1d
rules:
  entry: prior_breakout_high is cleared after warmup and fast trend remains above slow trend
  exit: close falls below fast trend or prior breakout support fails
tags: [baseline, deterministic, trend, research]
parameters:
  breakout_window: 20
  ema_fast: 20
  sma_slow: 50
  relative_volume_min: 1.05
  stop_atr_multiple: 2.0
search_space:
  breakout_window:
    kind: int
    low: 15
    high: 25
    step: 5
  relative_volume_min:
    kind: float
    low: 1.0
    high: 1.2
    step: 0.1
  stop_atr_multiple:
    kind: float
    low: 1.8
    high: 2.4
    step: 0.2
execution:
  fees_bps: 10
  slippage_bps: 8
  order_size_pct: 1.0
validation:
  warmup_bars: 55
  train_bars: 90
  test_bars: 30
  step_bars: 30
  walk_forward_required: true
  promote_requires_walk_forward: true
  robustness_required: true
  proxy_grade_if_symbol_mismatch: true
  max_search_trials: 12
